name: Artifact Upload Workflow
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
      - name: Lint code
        run: npm run lint 

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
 
  build-and-upload-artifact:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      script-file: ${{steps.publish.outputs.script-file}}
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci 
      - name: Build Project 
        run: npm run build 

      - name: Publish JS Files
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-files
          path: dist
  deploy:
      runs-on: ubuntu-latest
      needs: build-and-upload-artifact
      steps:
        - name: Download Artifact
          uses: actions/download-artifact@v6
          with:
            name: dist-files
        - name: Output contents
          run: ls
        - name: Output script file
          run: echo "${{ needs.build-and-upload-artifact.outputs.script-file }}"
        - name: Deploy
          run: echo "Deploying..."
     
