name: Artifact Upload Workflow
on:
  push:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        uses: npm run ci 
      - name: Lint code
        run: npm run lint 

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Deploy
        run: echo "Deploying..."
  upload-artifact:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci 
      - name: Build Project 
        run: npm run build 
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-files
          path: dist
