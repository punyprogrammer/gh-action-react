name: Event Pull Request Creation Edition
on:
  pull_request:
    types:
      - opened
      - edited
    # branches filter for target is main
    branches:
    # branches filter for target is main or integration
      - main
      - integration
    # paths filter for target is src/components/HelpBox.jsx
    paths:
      - 'src/components/HelpBoxs.jsx'
    # paths-ignore filter for target is src/components/HelpBox.jsx
    paths-ignore:
      - 'src/components/HelpBoxss.jsx'
    # paths-ignore filter for target is src/components/HelpBox.jsx
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying..."
