name: Lint, Test, and Deploy Project
on: [ push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - name: Get code
      uses:actions/checkout@v6
    - name: Install dependencies
      run: npm ci
    - name: Test Code 
      run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Get code
      uses:actions/checkout@v6
    - name: Install dependencies
      run: npm ci
    - name: Build project
      run: npm run build
    - name: Deploy
      run: echo "Deploying..."